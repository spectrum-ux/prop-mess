<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>München Properties</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset + Root ── */
:root{
  --bg:#0f0f0f;--s1:#181818;--s2:#222;--s3:#2a2a2a;--s4:#333;
  --t1:#f0ede8;--t2:#888;--t3:#555;
  --gr:#b8f0a0;--gr-bg:#162414;--gr-bd:#2a4a24;
  --am:#f0d080;--am-bg:#242014;--am-bd:#4a4224;
  --rd:#f09090;--rd-bg:#241414;--rd-bd:#4a2424;
  --bl:#90c0f0;--bl-bg:#14202e;--bl-bd:#1e4060;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--r:10px;
  --max:480px; /* mobile column max-width */
  --sidebar:280px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--sans);overscroll-behavior:none}
a{color:inherit;text-decoration:none}
input,button,select{font-family:var(--sans)}

/* ── Lock screen ── */
#lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;
  justify-content:center;z-index:1000;padding:20px}
.lock-card{width:100%;max-width:360px;background:var(--s1);border:1px solid var(--s3);
  border-radius:16px;padding:2.5rem 2rem;text-align:center}
.lock-icon{font-size:36px;margin-bottom:1rem;opacity:.6}
.lock-title{font-size:18px;font-weight:500;margin-bottom:6px}
.lock-sub{font-size:13px;color:var(--t2);margin-bottom:2rem}
.lock-input{width:100%;background:var(--s2);border:1px solid var(--s3);border-radius:8px;
  padding:12px 16px;font-size:15px;color:var(--t1);text-align:center;letter-spacing:.1em;
  margin-bottom:12px;transition:border-color .15s}
.lock-input:focus{outline:none;border-color:var(--t2)}
.lock-btn{width:100%;background:var(--gr-bg);border:1px solid var(--gr-bd);color:var(--gr);
  border-radius:8px;padding:12px;font-size:14px;font-weight:500;cursor:pointer;
  letter-spacing:.05em;transition:all .15s}
.lock-btn:active{opacity:.7}
.lock-err{font-size:12px;color:var(--rd);margin-top:10px;min-height:18px;font-family:var(--mono)}

/* ── Main app — hidden until auth ── */
#app{display:none;height:100dvh}
#app.authed{display:flex}

/* ── Desktop layout: sidebar + main ── */
.layout{display:flex;width:100%;height:100%}

/* Sidebar (desktop only) */
.sidebar{width:var(--sidebar);flex-shrink:0;border-right:1px solid var(--s3);
  display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:20px;border-bottom:1px solid var(--s3);flex-shrink:0}
.sidebar-title{font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  color:var(--t2);font-family:var(--mono);margin-bottom:2px}
.sidebar-count{font-family:var(--mono);font-size:12px;color:var(--t3)}
.sidebar-count span{color:var(--t1);font-weight:500}
.sidebar-tabs{display:flex;flex-direction:column;gap:4px;padding:12px}
.s-tab{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;
  border:1px solid var(--s3);border-radius:8px;background:none;color:var(--t2);
  font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;transition:all .15s;width:100%}
.s-tab .s-n{font-size:14px;font-weight:500;font-family:var(--mono)}
.s-tab.st-s{border-color:var(--gr-bd);background:var(--gr-bg);color:var(--gr)}
.s-tab.st-n{border-color:var(--am-bd);background:var(--am-bg);color:var(--am)}
.s-tab.st-r{border-color:var(--rd-bd);background:var(--rd-bg);color:var(--rd)}
.sidebar-sort{padding:0 12px 8px}
.sort-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);
  font-family:var(--mono);margin-bottom:6px}
.sort-select{width:100%;background:var(--s2);border:1px solid var(--s3);color:var(--t1);
  border-radius:6px;padding:6px 8px;font-family:var(--mono);font-size:11px;cursor:pointer}
.sidebar-actions{padding:12px;border-top:1px solid var(--s3);margin-top:auto;display:flex;gap:6px}
.sa-btn{flex:1;padding:8px;border-radius:7px;border:1px solid var(--s3);background:none;
  color:var(--t2);font-family:var(--mono);font-size:10px;letter-spacing:.05em;
  text-transform:uppercase;cursor:pointer;transition:all .15s}
.sa-btn:hover{border-color:var(--t3);color:var(--t1)}
.sa-btn:active{transform:scale(.97)}

/* Main panel */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Mobile topbar (hidden on desktop) */
.mob-topbar{display:none;align-items:center;gap:8px;padding:max(env(safe-area-inset-top),14px) 16px 10px;
  flex-shrink:0;border-bottom:1px solid var(--s3)}
.tb-title{flex:1;font-size:13px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;
  color:var(--t2);font-family:var(--mono)}
.tb-meta{font-family:var(--mono);font-size:12px;color:var(--t3)}
.tb-meta b{color:var(--t1)}
.tb-btn{background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer;
  padding:4px 6px;border-radius:6px;line-height:1;transition:color .15s}
.tb-btn:active{color:var(--t1)}

/* Mobile tabs + sort (hidden on desktop) */
.mob-tabs{display:none;gap:5px;padding:10px 16px 0;flex-shrink:0}
.tab{flex:1;padding:8px 4px;border:1px solid var(--s3);border-radius:8px;background:none;
  color:var(--t3);font-family:var(--mono);font-size:10px;letter-spacing:.06em;
  text-transform:uppercase;cursor:pointer;transition:all .15s;display:flex;
  flex-direction:column;align-items:center;gap:2px}
.tab .n{font-size:16px;font-weight:500;line-height:1;color:var(--t1)}
.tab.t-s{border-color:var(--gr-bd);background:var(--gr-bg);color:var(--gr)}
.tab.t-s .n{color:var(--gr)}
.tab.t-n{border-color:var(--am-bd);background:var(--am-bg);color:var(--am)}
.tab.t-n .n{color:var(--am)}
.tab.t-r{border-color:var(--rd-bd);background:var(--rd-bg);color:var(--rd)}
.tab.t-r .n{color:var(--rd)}
.mob-sort{display:none;gap:5px;padding:8px 16px 0;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.mob-sort::-webkit-scrollbar{display:none}
.sb{white-space:nowrap;padding:5px 10px;border:1px solid var(--s3);border-radius:6px;background:none;
  color:var(--t3);font-family:var(--mono);font-size:10px;letter-spacing:.05em;
  text-transform:uppercase;cursor:pointer;transition:all .12s;flex-shrink:0}
.sb.on{border-color:var(--t3);color:var(--t1);background:var(--s2)}

/* List */
.list-wrap{flex:1;overflow-y:auto;padding:12px 16px 80px;display:flex;flex-direction:column;
  gap:8px;-webkit-overflow-scrolling:touch}
.list-wrap::-webkit-scrollbar{width:4px}
.list-wrap::-webkit-scrollbar-track{background:transparent}
.list-wrap::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}

/* Desktop: list in 2 col when wide */
@media(min-width:1100px){
  .list-wrap{display:grid;grid-template-columns:1fr 1fr;align-content:start;gap:10px}
  .list-wrap .empty{grid-column:1/-1}
}

/* ── Card ── */
.card{background:var(--s1);border:1px solid var(--s3);border-radius:var(--r);
  padding:13px;cursor:pointer;position:relative;transition:border-color .15s}
.card:hover{border-color:var(--s4)}
.card:active{background:var(--s2)}
.new-dot{position:absolute;top:12px;right:12px;width:6px;height:6px;border-radius:50%;background:var(--bl)}
.c-id{font-size:14px;font-weight:500;line-height:1.3;margin-bottom:3px;padding-right:18px}
.c-url{font-family:var(--mono);font-size:10px;color:var(--bl);margin-bottom:8px;display:block;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-price{display:flex;gap:8px;align-items:center;margin-bottom:9px}
.c-kp{font-family:var(--mono);font-size:15px;font-weight:500}
.c-psqm{font-family:var(--mono);font-size:11px;color:var(--t3)}
.c-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:9px}
.kpi{background:var(--s2);border-radius:6px;padding:6px 7px}
.kv{font-family:var(--mono);font-size:13px;font-weight:500;line-height:1}
.kl{font-size:10px;color:var(--t2);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.kpi.g{background:var(--gr-bg);border:1px solid var(--gr-bd)} .kpi.g .kv{color:var(--gr)}
.kpi.a{background:var(--am-bg);border:1px solid var(--am-bd)} .kpi.a .kv{color:var(--am)}
.kpi.r{background:var(--rd-bg);border:1px solid var(--rd-bd)} .kpi.r .kv{color:var(--rd)}
.c-actions{display:flex;gap:5px}
.ab{flex:1;padding:8px 4px;border-radius:7px;border:1px solid var(--s3);background:none;
  font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;
  cursor:pointer;color:var(--t3);transition:all .12s}
.ab:active{transform:scale(.96)}
.ab-s{border-color:var(--gr-bd);color:var(--gr)} .ab-s:active{background:var(--gr-bg)}
.ab-n{border-color:var(--am-bd);color:var(--am)} .ab-n:active{background:var(--am-bg)}
.ab-r{border-color:var(--rd-bd);color:var(--rd)} .ab-r:active{background:var(--rd-bg)}
.ab-lnk{border-color:var(--t3);color:var(--t3);flex:0 0 38px;display:flex;
  align-items:center;justify-content:center}

/* ── Detail panel (slides in on desktop, full-page on mobile) ── */
.detail-panel{
  position:absolute;inset:0;background:var(--bg);
  transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;z-index:10}
.detail-panel.open{transform:translateX(0)}

/* Desktop: detail overlays just the main area */
@media(min-width:768px){
  .detail-panel{left:var(--sidebar);border-left:1px solid var(--s3)}
  .main{position:relative}
}

.det-topbar{display:flex;align-items:center;gap:8px;padding:14px 16px 10px;
  flex-shrink:0;border-bottom:1px solid var(--s3)}
.det-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.det-scroll::-webkit-scrollbar{width:4px}
.det-scroll::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.det-hero{padding:14px 16px 0}
.det-heading{font-size:16px;font-weight:500;line-height:1.35;margin-bottom:6px}
.det-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.badge{font-family:var(--mono);font-size:10px;font-weight:500;padding:3px 8px;border-radius:5px;
  letter-spacing:.05em;text-transform:uppercase}
.bd-type{background:var(--bl-bg);border:1px solid var(--bl-bd);color:var(--bl)}
.bd-yr{background:var(--s2);border:1px solid var(--s3);color:var(--t2)}
.bd-bal{background:var(--gr-bg);border:1px solid var(--gr-bd);color:var(--gr)}
.section{padding:0 16px 16px}
.sec-title{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
  color:var(--t3);font-family:var(--mono);padding:12px 0 8px;border-top:1px solid var(--s3)}
.rows{display:flex;flex-direction:column;gap:1px;background:var(--s3);border-radius:8px;
  overflow:hidden;margin-top:2px}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 11px;background:var(--s1)}
.row:first-child{border-radius:8px 8px 0 0}
.row:last-child{border-radius:0 0 8px 8px}
.row.total{background:var(--s2)}
.rk{font-size:13px;color:var(--t2)}
.rv{font-family:var(--mono);font-size:13px;font-weight:500}
.rv.pos{color:var(--gr)} .rv.neg{color:var(--rd)} .rv.neu{color:var(--am)} .rv.hi{color:var(--t1)}
.roi-cards{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.roi-card{background:var(--s2);border-radius:8px;padding:12px}
.roi-card.featured{background:var(--gr-bg);border:1px solid var(--gr-bd)}
.roi-v{font-family:var(--mono);font-size:18px;font-weight:500;line-height:1;margin-bottom:4px}
.roi-v.pos{color:var(--gr)} .roi-v.neg{color:var(--rd)} .roi-v.am{color:var(--am)}
.roi-bar{height:5px;background:var(--s3);border-radius:3px;margin-top:8px;overflow:hidden}
.roi-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.score-ring{display:flex;align-items:center;gap:10px;background:var(--s2);border-radius:8px;
  padding:12px;margin-top:4px}
.score-num{font-family:var(--mono);font-size:32px;font-weight:500}
.score-info{flex:1}
.score-label{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.score-desc{font-size:12px;color:var(--t1)}

/* ── Settings panel ── */
.settings-panel{
  position:absolute;inset:0;background:var(--bg);
  transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;z-index:11}
.settings-panel.open{transform:translateX(0)}
@media(min-width:768px){
  .settings-panel{left:var(--sidebar);border-left:1px solid var(--s3)}
}
.set-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 80px}
.set-scroll::-webkit-scrollbar{width:4px}
.set-scroll::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.set-cat{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
  color:var(--t3);font-family:var(--mono);padding:16px 0 8px;border-top:1px solid var(--s3)}
.set-cat:first-child{border-top:none;padding-top:10px}
.set-rows{display:flex;flex-direction:column;gap:1px;background:var(--s3);border-radius:8px;overflow:hidden}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:9px 11px;background:var(--s1)}
.set-row:first-child{border-radius:8px 8px 0 0}
.set-row:last-child{border-radius:0 0 8px 8px}
.set-lbl{font-size:13px;color:var(--t1);flex:1}
.set-unit{font-family:var(--mono);font-size:11px;color:var(--t3);flex-shrink:0}
.set-input{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--t1);
  background:var(--s2);border:1px solid var(--s3);border-radius:6px;padding:5px 8px;
  width:90px;text-align:right;-moz-appearance:textfield}
.set-input::-webkit-outer-spin-button,.set-input::-webkit-inner-spin-button{-webkit-appearance:none}
.set-input:focus{outline:none;border-color:var(--t3)}
.set-text{font-family:var(--mono);font-size:12px;color:var(--t1);background:var(--s2);
  border:1px solid var(--s3);border-radius:6px;padding:5px 8px;width:100%;margin-top:4px}
.set-text:focus{outline:none;border-color:var(--t3)}
.set-row-v{flex-direction:column;align-items:flex-start;gap:3px}
.set-token-row{display:flex;align-items:center;gap:6px;width:100%}
.set-token-val{font-family:var(--mono);font-size:11px;color:var(--t3);flex:1;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.token-ok{color:var(--gr)}
.tb-save{background:var(--gr-bg);border:1px solid var(--gr-bd);color:var(--gr);
  font-size:11px;font-weight:500;font-family:var(--mono);letter-spacing:.06em;
  padding:5px 10px;border-radius:6px;cursor:pointer}
.tb-save:active{opacity:.7}

/* ── Misc ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;color:var(--t3);font-family:var(--mono);font-size:12px;padding:60px 20px;
  flex:1;text-align:center}
.ei{font-size:28px;opacity:.2}
.mob-fab{position:absolute;bottom:max(env(safe-area-inset-bottom),20px);right:16px;
  width:44px;height:44px;border-radius:50%;background:var(--s2);border:1px solid var(--s3);
  color:var(--t2);font-size:20px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;z-index:10;transition:all .2s}
.mob-fab:active{transform:scale(.92);color:var(--t1)}
.mob-fab.spin{animation:spin .7s linear infinite}
.mob-settings-btn{position:absolute;bottom:max(env(safe-area-inset-bottom),20px);left:16px;
  width:44px;height:44px;border-radius:50%;background:var(--s2);border:1px solid var(--s3);
  color:var(--t2);font-size:18px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;z-index:10;transition:all .2s}
.mob-settings-btn:active{transform:scale(.92);color:var(--t1)}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--s2);border:1px solid var(--s3);color:var(--t1);font-family:var(--mono);
  font-size:12px;padding:9px 16px;border-radius:8px;opacity:0;transition:all .22s;
  pointer-events:none;white-space:nowrap;z-index:200;max-width:90%;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Responsive breakpoints ── */
@media(max-width:767px){
  .sidebar{display:none}
  .mob-topbar{display:flex}
  .mob-tabs{display:flex}
  .mob-sort{display:flex}
  .mob-fab,.mob-settings-btn{display:flex}
  .main{position:relative}
  .detail-panel,.settings-panel{left:0}
}
@media(min-width:768px){
  .mob-topbar,.mob-tabs,.mob-sort,.mob-fab,.mob-settings-btn{display:none !important}
  .main{position:relative}
}
</style>
</head>
<body>

<!-- ── Lock screen ── -->
<div id="lock">
  <div class="lock-card">
    <div class="lock-icon">🔐</div>
    <div class="lock-title">München Properties</div>
    <div class="lock-sub">Enter password to continue</div>
    <input class="lock-input" type="password" id="pw-input" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')unlock()">
    <button class="lock-btn" onclick="unlock()">Unlock</button>
    <div class="lock-err" id="pw-err"></div>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
<div class="layout">

  <!-- Sidebar (desktop) -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">München Tracker</div>
      <div class="sidebar-count" id="sb-count"></div>
    </div>
    <div class="sidebar-tabs">
      <button class="s-tab st-s" data-t="shortlist" onclick="switchTab('shortlist')">
        <span>Shortlist</span><span class="s-n" id="sb-ns">0</span>
      </button>
      <button class="s-tab" data-t="neutral" onclick="switchTab('neutral')">
        <span>Neutral</span><span class="s-n" id="sb-nn">0</span>
      </button>
      <button class="s-tab" data-t="rejected" onclick="switchTab('rejected')">
        <span>Rejected</span><span class="s-n" id="sb-nr">0</span>
      </button>
    </div>
    <div class="sidebar-sort">
      <div class="sort-label">Sort by</div>
      <select class="sort-select" id="sort-select" onchange="setSort(this.value)">
        <option value="score">Score</option>
        <option value="yield">Yield</option>
        <option value="npv10">NPV 10yr</option>
        <option value="price_asc">Price ↑</option>
        <option value="price_desc">Price ↓</option>
        <option value="new">Newest</option>
      </select>
    </div>
    <div class="sidebar-actions">
      <button class="sa-btn" onclick="loadData()" id="refresh-sb">↻ Refresh</button>
      <button class="sa-btn" onclick="openSettings()">⚙ Settings</button>
      <button class="sa-btn" onclick="doLogout()">↩ Logout</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main" id="main-area">

    <!-- Mobile topbar -->
    <div class="mob-topbar">
      <span class="tb-title">München</span>
      <span class="tb-meta" id="mob-count"></span>
    </div>

    <!-- Mobile tabs -->
    <div class="mob-tabs">
      <button class="tab t-s" data-t="shortlist" onclick="switchTab('shortlist')">
        <span class="n" id="m-ns">0</span>shortlist
      </button>
      <button class="tab" data-t="neutral" onclick="switchTab('neutral')">
        <span class="n" id="m-nn">0</span>neutral
      </button>
      <button class="tab" data-t="rejected" onclick="switchTab('rejected')">
        <span class="n" id="m-nr">0</span>rejected
      </button>
    </div>

    <!-- Mobile sort -->
    <div class="mob-sort">
      <button class="sb on" data-s="score"      onclick="setSort('score')">Score</button>
      <button class="sb"    data-s="yield"      onclick="setSort('yield')">Yield</button>

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function calcMaxRent(sqm,zip){
  if(!sqm||sqm<20||sqm>160)return 0;
  const zi=ZD[zip]||{w:0};const wi=zi.w;
  const su=CEN[wi]?3.80:2.77;

  for(const r of T2){if(sqm<=r[1]){bp=r[2];break;}}
  return Math.round((bp+WA[wi]+su)*sqm);
}

function calcROI(p,s){
  const pr=+(p.price||0);if(!pr)return null;
  const sqm=+(p.sqm||0);
  const g=+(p.garage_price||0);
  const makPct=p.maklerprovision_pct!=null?+p.maklerprovision_pct:s.maklerprovision;
  const mak=pr*makPct/100,ge=pr*s.grunderwerbsteuer/100;
  const not_=pr*s.notarkosten/100,gb=pr*s.grundbuch/100;
  const totalInv=pr+g+mak+ge+not_+gb;
  const loan=Math.max(0,totalInv-s.upfront);
  const mr=s.loan_rate/100/12,nm=s.loan_term*12;
  const mlp=mr>0?loan*mr*Math.pow(1+mr,nm)/(Math.pow(1+mr,nm)-1):loan/nm;
  const rent=+(p.max_rent||0)||calcMaxRent(sqm,p.zip||'');
  const hg=+(p.hausgeld_monthly||0),dr=s.discount_rate/100/12,ri=s.rent_inflation/100;
  function npv(yrs){
    let v=-s.upfront;
    for(let m=1;m<=yrs*12;m++){
      const yr=Math.floor((m-1)/12);
      v+=(rent*Math.pow(1+ri,yr)-hg-mlp)/Math.pow(1+dr,m);
    }
    const remMo=Math.max(0,nm-yrs*12);
    const remLoan=remMo>0?mlp*(1-Math.pow(1+mr,-remMo))/mr:0;
    v+=(pr-remLoan)/Math.pow(1+s.discount_rate/100,yrs);
    return Math.round(v);
  }
  let payback=null;
  for(let y=1;y<=40;y++){if(npv(y)>=0){payback=y;break;}}
  const gy=rent&&pr?rent*12/pr*100:0;
  const netCf=rent-hg-mlp;
  const n10=npv(10),n15=npv(15);
  const score=Math.min(100,Math.max(0,Math.round(gy*9+(n10>0?15:-10))));
  return{mak:Math.round(mak),ge:Math.round(ge),not_:Math.round(not_),gb:Math.round(gb),
    totalInv:Math.round(totalInv),loan:Math.round(loan),mlp:Math.round(mlp),
    rent:Math.round(rent),hg,netCf:Math.round(netCf),
    npv10:n10,npv15:n15,payback,gy:+gy.toFixed(1),score,
    ppsqm:sqm?Math.round(pr/sqm):null};
}

      <div class="row"><span class="rk">Notarkosten (${S.notarkosten}%)</span><span class="rv">€ ${f(r.not_)}</span></div>
      <div class="row"><span class="rk">Grundbucheintrag (${S.grundbuch}%)</span><span class="rv">€ ${f(r.gb)}</span></div>
      <div class="row"><span class="rk">Maklerprovision</span><span class="rv">€ ${f(r.mak)}</span></div>
      <div class="row total"><span class="rk" style="font-weight:500">Total investment</span><span class="rv hi">€ ${f(r.totalInv)}</span></div>
      <div class="row"><span class="rk">Own capital (upfront)</span><span class="rv">€ ${f(S.upfront)}</span></div>
      <div class="row"><span class="rk">Loan (${S.loan_rate}% / ${S.loan_term}yr)</span><span class="rv">€ ${f(r.loan)}</span></div>
    </div>
  </div>
  <div class="section">
    <div class="sec-title">ROI analysis</div>
    <div class="rows">
      <div class="row"><span class="rk">Monthly loan payment</span><span class="rv">€ ${f(r.mlp)}</span></div>
      <div class="row"><span class="rk">Max rent (Mietspiegel 2025)</span><span class="rv pos">€ ${f(r.rent)} / mo</span></div>
      ${p.actual_rent_monthly?`<div class="row"><span class="rk">Market rent (benchmark)</span><span class="rv" style="color:var(--bl)">€ ${f(p.actual_rent_monthly)} / mo · €${f(p.actual_rent_per_sqm,2)}/m²</span></div>`:''}
      <div class="row"><span class="rk">Hausgeld incl. Nebenkosten</span><span class="rv">€ ${f(r.hg)} / mo</span></div>
      <div class="row total"><span class="rk" style="font-weight:500">Net monthly cash flow</span><span class="rv ${r.netCf>=0?'pos':'neg'}">€ ${f(r.netCf)} / mo</span></div>
      <div class="row"><span class="rk">Gross yield</span><span class="rv ${yldCls(r.gy||0)}">${r.gy||0}%</span></div>
    </div>
    <div class="roi-cards" style="margin-top:8px">
      <div class="roi-card${r.npv10>0?' featured':''}">
        <div class="roi-v ${r.npv10>0?'pos':'neg'}">${fe(r.npv10)}</div>
        <div class="roi-l">NPV 10 years</div>
        <div class="roi-bar"><div class="roi-bar-fill" style="width:${Math.min(100,Math.max(0,(r.npv10/(r.totalInv||1))*100))}%;background:${r.npv10>0?'var(--gr)':'var(--rd)'}"></div></div>
      </div>
      <div class="roi-card${r.npv15>0?' featured':''}">
        <div class="roi-v ${r.npv15>0?'pos':'neg'}">${fe(r.npv15)}</div>
        <div class="roi-l">NPV 15 years</div>
        <div class="roi-bar"><div class="roi-bar-fill" style="width:${Math.min(100,Math.max(0,(r.npv15/(r.totalInv||1))*100))}%;background:${r.npv15>0?'var(--gr)':'var(--rd)'}"></div></div>
      </div>
      <div class="roi-card">
        <div class="roi-v am">${r.payback?r.payback+' yr':'> 40yr'}</div>
        <div class="roi-l">Payback period</div>
      </div>
      <div class="roi-card">
        <div class="roi-v" style="color:var(--bl)">${S.general_inflation}% / yr</div>
        <div class="roi-l">Inflation (discount)</div>
      </div>
    </div>
    <div class="score-ring" style="margin-top:8px">
      <div class="score-num" style="color:${r.score>=70?'var(--gr)':r.score>=45?'var(--am)':'var(--rd)'}">${r.score??'—'}</div>
      <div class="score-info">
        <div class="score-label">Investment score</div>
        <div class="score-desc">${r.score!=null?scoreInfo(r.score):'—'}</div>
      </div>
    </div>
  </div>
  <div style="height:20px"></div>`;
  document.getElementById('det-panel').classList.add('open');
};

window.closeDetail=function(){
  document.getElementById('det-panel').classList.remove('open');
};

/* ── Settings ── */
window.openSettings=function(){
  document.getElementById('set-panel').classList.add('open');
};
window.closeSettings=function(){
  document.getElementById('set-panel').classList.remove('open');
};

function renderSettings(){
  document.getElementById('set-body').innerHTML=SET_CFG.map(cat=>{
    const numRows=(cat.fields||[]).map(f=>`
      <div class="set-row">
        <span class="set-lbl">${f.l}</span>
        <span class="set-unit">${f.u}</span>
        <input class="set-input" type="number" inputmode="decimal" step="${f.step}" id="s_${f.k}" value="${S[f.k]??''}">
      </div>`).join('');
    const txtRows=(cat.texts||[]).map(f=>{
      const val=S[f.k]||'';
      const display=f.secret&&val?val.slice(0,8)+'••••••••••••':val;
      return`<div class="set-row set-row-v">
        <span class="set-lbl">${f.l}</span>
        ${f.secret&&val?`<div class="set-token-row"><span class="set-token-val token-ok">${display}</span><button style="font-family:var(--mono);font-size:10px;padding:3px 8px;border:1px solid var(--s3);background:none;color:var(--t2);border-radius:5px;cursor:pointer" onclick="document.getElementById('s_${f.k}').style.display='block';this.style.display='none'">Change</button></div>`:''}
        <input class="set-text" type="${f.secret?'password':'text'}" id="s_${f.k}" placeholder="${f.ph||''}" value="${val}" style="${f.secret&&val?'display:none':''}">
      </div>`;
    }).join('');
    return`<div class="set-cat">${cat.cat}</div>
    ${numRows||txtRows?`<div class="set-rows">${numRows}${txtRows}</div>`:''}`;
  }).join('');
}

window.saveSettings=async function(){
  SET_CFG.forEach(cat=>{
    (cat.fields||[]).forEach(f=>{
      const v=+document.getElementById('s_'+f.k).value;
      if(!isNaN(v))S[f.k]=v;
    });
    (cat.texts||[]).forEach(f=>{
      const el=document.getElementById('s_'+f.k);
      if(el&&el.value.trim())S[f.k]=el.value.trim();
    });
  });
  const saveData=Object.assign({},S,{search_urls:[S.url_houses||'',S.url_apartments||'',S.url_rowhouses||'']});
  localStorage.setItem('muc_settings',JSON.stringify(S));
  const{error}=await SB.from('app_settings').update({data:saveData,updated_at:new Date().toISOString()}).eq('id',1);
  if(error)toast('Saved locally (cloud error)');
  else toast('Settings saved');
  renderList();
  closeSettings();
};

async function loadSettings(){
  const local=localStorage.getItem('muc_settings');
  if(local)try{S=Object.assign({},DEFS,JSON.parse(local));}catch(e){}
  const{data:row}=await SB.from('app_settings').select('data').eq('id',1).single();
  if(row?.data){
    const d=row.data;
    if(Array.isArray(d.search_urls)){
      d.url_houses=d.search_urls[0]||'';
      d.url_apartments=d.search_urls[1]||'';
      d.url_rowhouses=d.search_urls[2]||'';
    }
    S=Object.assign({},DEFS,d);
    localStorage.setItem('muc_settings',JSON.stringify(S));
  }
}

/* ── Move ── */
window.move=async function(id,ns){
  const{error}=await SB.from('properties').update({status:ns,status_updated_at:new Date().toISOString(),is_new:false}).eq('id',id);
  if(error){toast('Error: '+error.message);return;}
  let moved;
  ['shortlist','neutral','rejected'].forEach(t=>{
    const i=data[t].findIndex(p=>p.id===id);
    if(i>-1){moved=data[t].splice(i,1)[0];}
  });
  if(moved){moved.status=ns;data[ns].unshift(moved);}
  updateCounts();renderList();toast('→ '+ns);
};

/* ── Load ── */
window.loadData=async function(){
  const rfb=document.getElementById('mob-refresh');
  const rfsb=document.getElementById('refresh-sb');
  rfb&&rfb.classList.add('spin');
  rfsb&&(rfsb.textContent='↻ Loading…');
  const{data:rows,error}=await SB.from('properties').select('*').order('crawled_at',{ascending:false});
  rfb&&rfb.classList.remove('spin');
  rfsb&&(rfsb.textContent='↻ Refresh');
  if(error){toast('Load failed: '+error.message);return;}
  data={shortlist:[],neutral:[],rejected:[]};
  (rows||[]).forEach(p=>{const st=p.status||'neutral';(data[st]=data[st]||[]).push(p);});
  updateCounts();renderList();
};

/* ── Init ── */
async function init(){
  await loadSettings();
  renderSettings();
  await loadData();
}

// Run init if already authed on page load
if(sessionStorage.getItem(SESSION_KEY)==='1') init();
</script>
</body>
</html>
